<div>
    <div *ngIf="spinnerOn === true" class="spinner-div">
        <div class="d-flex align-items-center w50 bordered-rounded centered">
            Loading authors list from GEOROC.
            <div class="spinner-border ms-auto" role="status" aria-hidden="true"></div>
        </div>
    </div>
    <div *ngIf="spinner2On === true" class="spinner-div">
        <div class="d-flex align-items-center w50 bordered-rounded centered">
            Loading sample's list for {{ selection.lastName + ' ' + selection.firstName }}
            <div class="spinner-border ms-auto" role="status" aria-hidden="true"></div>
        </div>
    </div>
    <div class="w95 centered data-gathering-header">
        <div class="row">
            <div class="col-11">
                <input type="text" class="form-control" id="auth" placeholder="Filter by author's last name"  [(ngModel)]="lastName" (ngModelChange)="filterAuthors()">
            </div>
            <div class="col-1"><span *ngIf="waitingSpinner" style="padding: 0.375rem 0.75rem;" class="fa-solid fa-spinner fa-spin fa-lg"></span></div>
        </div>

        <!-- <datalist #authlist id="authlist"></datalist> -->
        <div style="max-height: 14em; border: solid 1px lightgray;" class="scrollable mt-1">
            <table class="w100" *ngIf="!!filteredAuthors && filteredAuthors.length > 0">
                <tr *ngFor="let a of filteredAuthors" (click)="select(a)" class="clickable" [style.background]="a.color ? 'orange' : 'white'">
                    <td>{{ a.personId }}</td>
                    <td>{{ a.lastName }}</td>
                    <td>{{ a.firstName }}</td>
                </tr>
            </table>
        </div>
        <div style="margin-top: 9px !important;">
            <div style="margin-top: 1px !important;" class="row" *ngIf="!!selection">
                <div class="col-6">Selected: <span style="font-weight: bold;">{{ selection.lastName }} {{ selection.firstName}} </span></div>
                <div class="col-6 text-right">
                    <button type="button" class="btn btn-secondary" (click)="reset()">Reset</button>&nbsp;
                    <button type="button" class="btn btn-primary" (click)="use()">Use this</button>
                </div>
            </div>
        </div>
    </div>

</div>
