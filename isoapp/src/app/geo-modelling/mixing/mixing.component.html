<div class="application-frame"  style="background-color: white; margin-top: 5em !important">
    <div *ngIf="!chartView">
        <div>
            <app-end-member [members]="params?.endMembers" (outMember)="getAnalyzedMembers($event)"
                (onSelect)="getSelected($event)"></app-end-member>
        </div>
        <div class="w95 centered" *ngIf="!!computables">

            <div *ngFor="let c of computables; index as i">
                <div class="mt-2 mb-2">
                    <button type="button" class="btn btn-outline-primary" *ngIf="!!c.active"
                        (click)="onMemberSelection(c)">End member: <strong>{{ c.endMemberName }}</strong></button>
                    <button type="button" class="btn btn-outline-secondary" *ngIf="!c.active"
                        (click)="onMemberSelection(c)">End member: {{ c.endMemberName }}</button>
                </div>
                <div class="row mt-2 underlined">
                    <div class="col-1">{{ c.elementName }}</div>
                    <div class="col-2">{{ c.elementValue }}</div>
                    <div class="col-2">
                        <select style="border: solid 1px #dee2e6; padding: 0.375rem 0.75rem" [(ngModel)]="computables[i].concentration" (ngModelChange)="setConcentrationValue(computables[i], i)">
                            <option *ngFor="let o of this.selectOptions">
                                {{ o.name }}
                            </option>
                        </select>
                        <span class="fa-solid fa-circle-info" style="color: darkgreen; margin-left: 3px;"
                        ngbPopover="When isotope ratio is selected, then choose the related element concentration value"
                        triggers="mouseenter:mouseleave"></span>
                    </div>
                    <div class="col-3"><input class="clickable" type="checkbox" #ratio (change)="onRatio($event, c)"
                            [disabled]="c.elementValue.length === 0"> x / y
                        <span class="fa-solid fa-circle-info" style="color: darkgreen;"
                            ngbPopover="If checked allow you to evaluate a ratio between two elements"
                            triggers="mouseenter:mouseleave"></span>&nbsp;
                        <input class="clickable" type="checkbox" #inverse (change)="onInverse($event, c)"
                            [disabled]="c.elementValue.length === 0"> 1 / x
                        <span class="fa-solid fa-circle-info" style="color: darkgreen;"
                            ngbPopover="If checked allow you to evaluate the inverse of the selected value"
                            triggers="mouseenter:mouseleave"></span>
                    </div>
                    <div class="col-2"><input type="text" class="form-control" placeholder="Element"
                            [(ngModel)]="computables[i].elementName"></div>
                    <div class="col-2"><input type="number" class="form-control" placeholder="Concentration"
                            [(ngModel)]="computables[i].elementValue"></div>

                </div>
            </div>

        </div>
        <div class="w95 centered mt-2">
            <div class="row">
                <div class="col-2">
                    <div class="form-group">
                        <label for="step">Increment <span class="fa-solid fa-circle-info" style="color: darkgreen;"
                                ngbPopover="The increment of the weight proportion of the end member in the mixture"
                                triggers="mouseenter:mouseleave"></span></label>
                        <input type="number" data-bs-input class="form-control" id="step" min="0.01" max="1.0"
                            step="0.01" [(ngModel)]="step">
                    </div>
                </div>
                <div class="col-10 text-right">
                    <button class="btn btn-secondary m-1" (click)="close()"><i class="fa-solid fa-delete-left"></i> Back
                        to
                        data</button>
                    <button class="btn btn-secondary m-1" (click)="clean()"><i class="fa-solid fa-xmark"></i> Clean
                        cache</button>
                    <button class="btn btn-secondary m-1" (click)="reset()"><i class="fa-solid fa-rotate"></i>
                        Reset selection</button>
                    <button class="btn btn-primary m-1" (click)="submit()" [disabled]="!submitOn"><i
                            class="fa-solid fa-check"></i> Submit</button>
                </div>
            </div>
        </div>
        <div *ngIf="!!outResult && outResult.length > 0">
            <div class="w95 centered mt-2 scrollable" style="max-width: 95%">
                <table class="centered">
                    <tr *ngFor="let res of outResult">
                        <ng-template ngFor let-cell [ngForOf]="res.row" let-i="index">
                            <td class="evidence p-1" *ngIf="i === 0">{{ cell }}</td>
                            <td class="text-right p-1" *ngIf="i > 0">{{ cell }}</td>
                        </ng-template>
                    </tr>
                </table>
            </div>
            <div class="w95 centered mt-2 text-right">
                <button class="btn btn-primary m-1" (click)="chart()"><i class="fa-solid fa-chart-line"></i>
                    Chart</button>
                <button class="btn btn-primary m-1" (click)="export()"><i class="fa-solid fa-download"></i>
                    Export</button>
            </div>
        </div>
    </div>
    <!--------------------------------------------------  CHART --------------------------------------------------------------->
    <div *ngIf="!!chartView">
         <div class="row header pt-1 pb-1" style="background-color: white;">
            <div class="row header pt-1 pb-1">
                <div class="col-1">&nbsp;</div>
                <div class="col-8 text-left">
                    Width:
                    <input type="number" class="form-control" [(ngModel)]="chartWidth"
                        (ngModelChange)="changeSize = true" style="max-width: 5em; display: inline-block;">
                    Height:
                    <input type="number" class="form-control" [(ngModel)]="chartHeight"
                        (ngModelChange)="changeSize = true" style="max-width: 5em; display: inline-block;">
                    &nbsp;
                    <button class="btn btn-outline-dark" type="button" (click)="chartSizeChange()"
                        [disabled]="!changeSize"><i class="fa-solid fa-expand"></i></button>
                    &nbsp;
                    <input type="checkbox" [(ngModel)]="fixedRatio" (ngModelChange)="chartSizeChange()">Fixed ratio
                    (4:3)
                </div>
                <div class="col-1 text-right">
                    <button class="btn btn-primary m-1" (click)="plot(geoData, geoModelsService)"><i class="fa-solid fa-asterisk"></i> Plot</button>
                </div>    
                <div class="col-2 text-right">
                    <button class="btn btn-primary m-1" (click)="chartView = false"><i
                            class="fa-solid fa-circle-left"></i>
                        Back to data</button>
                </div>
            </div>

            <div class="centered" style="background-color: white;">
                <canvasjs-chart [options]="chartOptions" (chartInstance)="getChartInstance($event)"></canvasjs-chart>
            </div>
        </div>
    </div>
